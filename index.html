<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHANNN</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase -->
  <script type="module" src="app.js"></script>
</head>
<body>

<header class="header">

  <!-- LEFT HEADER -->
  <div class="header-left">
    <div class="title-main">EMAIL</div>

    <div class="stats">

      <div class="stat">
        <span class="label">TOTAL</span>
        <span id="total-count">0</span>
      </div>

      <div class="divider">|</div>

      <div class="stat">
        <span class="label">SELESAI</span>
        <span id="checked-count">0</span>
      </div>

    </div>
  </div>

  <!-- RIGHT HEADER -->
  <div class="admin-toggle" id="admin-toggle">
  Admin
</div>

</header>

<div id="loading" class="loading">Memuat data...</div>
<div id="list-container"></div>

<button id="fab">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-content add-mode">
    <h2 id="modal-title">Tambah Data</h2>

    <input type="hidden" id="item-id">
    <input type="text" id="email-input" placeholder="Email">
    <input type="text" id="password-input" placeholder="Password">

    <div class="modal-actions">
      <button class="btn btn-delete hidden" id="btn-delete">Hapus</button>
      <button class="btn btn-cancel" id="btn-cancel">Batal</button>
      <button class="btn btn-save" id="btn-save">Simpan</button>
    </div>
  </div>
</div>

</body>
</html>
